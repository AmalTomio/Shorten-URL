services:
  mysql:
    image: mysql:8.4

    container_name: shortener_mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shortener

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: ./backend

    container_name: shortener_backend

    restart: unless-stopped

    depends_on:
      - mysql

    ports:
      - "9000:80"

    env_file:
      - ./backend/.env.example

volumes:
  mysql_data: